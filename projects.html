<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Projects | BVG Murbad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfaf6; }
        h1, h2, h3 { font-family: 'Lora', serif; }
        .project-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="antialiased">
    <header class="bg-white/80 backdrop-blur-lg sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="/images/logo.png" alt="BVG Logo" class="h-12 w-12 rounded-full">
                <a href="/" class="text-xl font-bold text-gray-800">BVG Murbad</a>
            </div>
            <nav class="hidden md:flex space-x-6">
                <a href="/" class="text-gray-600 hover:text-teal-600">Home</a>
                <a href="/about.html" class="text-gray-600 hover:text-teal-600">About Us</a>
                <a href="/academics.html" class="text-gray-600 hover:text-teal-600">Academics</a>
                <a href="/projects.html" class="text-teal-600 font-bold border-b-2 border-teal-600">Projects</a>
                <a href="/admissions.html" class="text-gray-600 hover:text-teal-600">Admissions</a>
                <a href="/donate.html" class="bg-amber-500 text-white font-bold py-2 px-5 rounded-full">Donate</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="bg-teal-700 text-white text-center py-20">
            <div class="container mx-auto px-6">
                <h1 id="projects-title" class="text-4xl font-bold">Our Upcoming Projects</h1>
                <p id="projects-subtitle" class="text-lg mt-4 max-w-3xl mx-auto">Loading...</p>
            </div>
        </section>

        <section class="py-20 bg-gray-50">
            <div class="container mx-auto px-6">
                <div id="projects-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white py-10 text-center text-sm">
        <p>&copy; 2026 Bhaktivedanta Vidyabhavan Gurukula. All Rights Reserved.</p>
    </footer>

    <script>
        fetch('/_data/content.json').then(res => res.json()).then(data => {
            document.getElementById('projects-title').innerText = data.projects.title;
            document.getElementById('projects-subtitle').innerText = data.projects.subtitle;
            const container = document.getElementById('projects-container');
            container.innerHTML = '';
            data.projects.projects.forEach(project => {
                container.innerHTML += `
                    <div class="project-card bg-white rounded-xl shadow-lg overflow-hidden flex flex-col border-t-4 border-amber-500">
                        <img src="${project.image}" alt="${project.title}" class="w-full h-52 object-cover">
                        <div class="p-6 flex-grow flex flex-col">
                            <h3 class="text-xl font-bold mb-2">${project.title}</h3>
                            <p class="text-gray-600 text-sm mb-6 flex-grow">${project.description}</p>
                            <a href="/donate.html" class="bg-teal-600 text-white font-bold py-3 px-6 rounded-full text-center">Support Seva</a>
                        </div>
                    </div>
                `;
            });
        });
        lucide.createIcons();
    </script>
</body>
</html>
