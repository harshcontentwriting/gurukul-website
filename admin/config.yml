backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Global Content Manager"
    delete: false
    editor:
      preview: false
    files:
      - name: "site_content"
        label: "Edit All Website Text & Images"
        file: "_data/content.json"
        fields:
          - label: "Global Settings"
            name: "global"
            widget: "object"
            fields:
              - {label: "Contact Phone", name: "contact_phone", widget: "string"}
              - {label: "Footer Address", name: "footer_address", widget: "string"}
              - {label: "YouTube Link", name: "youtube_link", widget: "string"}
              - {label: "Instagram Link", name: "instagram_link", widget: "string"}
              - {label: "Facebook Link", name: "facebook_link", widget: "string"}

          - label: "Homepage Hero"
            name: "homepage"
            widget: "object"
            fields:
              - {label: "Hero Image", name: "hero_image", widget: "image"}
              - {label: "Hero Headline", name: "hero_headline", widget: "string"}
              - {label: "Hero Sub-headline", name: "hero_subheadline", widget: "text"}

          - label: "Our Lineage"
            name: "lineage"
            widget: "object"
            fields:
              - {label: "Prabhupada Image", name: "prabhupada_image", widget: "image"}
              - {label: "Prabhupada Name", name: "prabhupada_name", widget: "string"}
              - {label: "Maharaj Image", name: "maharaj_image", widget: "image"}
              - {label: "Maharaj Name", name: "maharaj_name", widget: "string"}

          - label: "Upcoming Projects"
            name: "projects"
            widget: "object"
            fields:
              - label: "Project List"
                name: "projects"
                widget: "list"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Summary", name: "summary", widget: "string"}
                  - {label: "Full Description", name: "description", widget: "text"}
                  - {label: "Project Image", name: "image", widget: "image"}

          - label: "Team Members"
            name: "about"
            widget: "object"
            fields:
              - label: "The Team"
                name: "team_members"
                widget: "list"
                fields:
                  - {label: "Name", name: "name", widget: "string"}
                  - {label: "Photo", name: "photo", widget: "image"}
                  - {label: "Description/Bio", name: "description", widget: "text"}

          - label: "Donation Info"
            name: "donate"
            widget: "object"
            fields:
              - {label: "UPI QR Code", name: "upi_qr_image", widget: "image"}
              - {label: "Bank Details", name: "bank_donation_info", widget: "text"}
              - {label: "Important Note/Disclaimer", name: "upi_note", widget: "text"}
