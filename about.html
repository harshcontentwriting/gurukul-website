<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | BVG Murbad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfaf6; color: #374151; }
        h1, h2, h3 { font-family: 'Lora', serif; }
        .team-photo { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; border: 4px solid #F59E0B; }
    </style>
</head>
<body>
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="/images/logo.png" alt="Logo" class="h-12 w-12 rounded-full">
                <span class="text-xl font-bold text-gray-800">BVG Murbad</span>
            </div>
            <nav class="hidden md:flex space-x-6">
                <a href="/" class="hover:text-teal-600">Home</a>
                <a href="/about.html" class="text-teal-600 font-bold border-b-2 border-teal-600">About Us</a>
                <a href="/academics.html" class="hover:text-teal-600">Academics</a>
                <a href="/projects.html" class="hover:text-teal-600">Projects</a>
                <a href="/admissions.html" class="hover:text-teal-600">Admissions</a>
                <a href="/donate.html" class="bg-amber-500 text-white px-4 py-2 rounded-full">Donate</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="bg-teal-900 text-white py-20 text-center">
            <h1 id="about-title" class="text-4xl font-bold">About Our Gurukula</h1>
            <p id="about-subtitle" class="mt-4 text-lg">Loading mission statement...</p>
        </section>

        <section class="py-20 bg-gray-50">
            <div class="container mx-auto px-6 text-center">
                <h2 class="text-3xl font-bold mb-12">Our Dedicated Team</h2>
                <div id="team-container" class="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                    <p>Loading the team from Murbad...</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white py-10 text-center text-sm">
        <p id="footer-copy">&copy; 2026 Bhaktivedanta Vidyabhavan Gurukula. All Rights Reserved.</p>
    </footer>

    <script>
        fetch('/_data/content.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('about-title').innerText = data.about.title;
                document.getElementById('about-subtitle').innerText = data.about.subtitle;
                
                const container = document.getElementById('team-container');
                container.innerHTML = ''; 

                data.about.team_members.forEach(member => {
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-xl shadow-md flex flex-col items-center">
                            <img src="${member.photo}" alt="${member.name}" class="team-photo mb-4">
                            <h3 class="text-xl font-bold">${member.name}</h3>
                            <p class="text-gray-600 text-sm mt-2">${member.description || ''}</p>
                        </div>
                    `;
                });
            });
        lucide.createIcons();
    </script>
</body>
</html>
