<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate | BVG Murbad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfaf6; }
        h1, h2 { font-family: 'Lora', serif; }
    </style>
</head>
<body>
    <header class="bg-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <img src="/images/logo.png" class="h-10 w-10 rounded-full">
                <span class="font-bold text-xl text-gray-800">BVG Murbad</span>
            </div>
            <a href="/" class="text-teal-600 font-medium">Back to Home</a>
        </div>
    </header>

    <main class="py-16 container mx-auto px-6 max-w-4xl text-center">
        <h1 id="donate-title" class="text-4xl font-bold mb-4">Support Our Seva</h1>
        <p id="donate-subtitle" class="text-gray-600 mb-12"></p>

        <div class="grid md:grid-cols-2 gap-10">
            <div class="bg-white p-8 rounded-2xl shadow-lg border-t-4 border-amber-500">
                <h2 class="text-2xl font-bold mb-6">Direct UPI</h2>
                <img id="upi-qr" src="" class="w-64 h-64 mx-auto border rounded-lg p-2 mb-4 bg-white">
                <p id="upi-note" class="text-gray-500 text-xs italic"></p>
            </div>
            <div class="bg-white p-8 rounded-2xl shadow-lg border-t-4 border-teal-600 text-left">
                <h2 class="text-2xl font-bold mb-6 text-center">Bank Transfer</h2>
                <div id="bank-info" class="text-gray-700 whitespace-pre-line text-sm"></div>
            </div>
        </div>
    </main>

    <script>
        fetch('/_data/content.json').then(res => res.json()).then(data => {
            const d = data.donate;
            document.getElementById('donate-title').innerText = d.title;
            document.getElementById('donate-subtitle').innerText = d.subtitle;
            document.getElementById('upi-qr').src = d.upi_qr_image;
            document.getElementById('upi-note').innerText = d.upi_note;
            document.getElementById('bank-info').innerText = d.bank_donation_info;
        });
    </script>
</body>
</html>
