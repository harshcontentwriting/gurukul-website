<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admissions | BVG Murbad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfaf6; }
        h1, h2, h3 { font-family: 'Lora', serif; }
        .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
    </style>
</head>
<body>
    <header class="bg-white/80 backdrop-blur-lg sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="/images/logo.png" alt="BVG Logo" class="h-12 w-12 rounded-full">
                <a href="/" class="text-xl font-bold text-gray-800">BVG Murbad</a>
            </div>
            <nav class="hidden md:flex space-x-6">
                <a href="/" class="text-gray-600">Home</a>
                <a href="/admissions.html" class="text-teal-600 font-bold border-b-2 border-teal-600">Admissions</a>
                <a href="/donate.html" class="bg-amber-500 text-white font-bold py-2 px-5 rounded-full">Donate</a>
            </nav>
        </div>
    </header>

    <main class="py-16 container mx-auto px-6">
        <div class="grid lg:grid-cols-2 gap-12">
            <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-amber-500">
                <h2 class="text-2xl font-bold mb-6">Submit Your Inquiry</h2>
                <form class="space-y-4">
                    <input type="text" placeholder="Parent's Name" class="w-full px-4 py-2 border rounded-lg">
                    <input type="tel" placeholder="Phone Number" class="w-full px-4 py-2 border rounded-lg">
                    <button type="submit" class="w-full bg-teal-600 text-white font-bold py-3 rounded-lg shadow-md">Submit Inquiry</button>
                </form>
            </div>
            <div>
                <h2 class="text-2xl font-bold mb-8">Frequently Asked Questions</h2>
                <div id="faq-container" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        fetch('/_data/content.json').then(res => res.json()).then(data => {
            const container = document.getElementById('faq-container');
            data.admissions.faq_items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow border-l-4 border-amber-500">
                        <button class="w-full text-left font-bold text-gray-800 flex justify-between" onclick="toggleFaq(${index})">
                            ${item.question} <i data-lucide="chevron-down" id="icon-${index}"></i>
                        </button>
                        <div id="faq-ans-${index}" class="faq-answer pt-4 text-gray-600 text-sm">
                            <p>${item.answer}</p>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        });
        function toggleFaq(index) {
            const ans = document.getElementById(`faq-ans-${index}`);
            ans.style.maxHeight = (ans.style.maxHeight && ans.style.maxHeight !== '0px') ? '0px' : ans.scrollHeight + 'px';
        }
    </script>
</body>
</html>
