<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">Bhaktivedanta Vidyabhavan Gurukula | Murbad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg-color: #fdfaf6; --primary-color: #0D9488; --accent-color: #F59E0B; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: #374151; }
        h1, h2, h3 { font-family: 'Lora', serif; }
        .hero-section { background-size: cover; background-position: center; background-attachment: fixed; }
    </style>
</head>
<body class="antialiased">
    <header class="bg-white/80 backdrop-blur-lg sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="/images/logo.png" alt="BVG Logo" class="h-12 w-12 rounded-full">
                <a href="/" class="text-xl font-bold text-gray-800">BVG Murbad</a>
            </div>
            <nav class="hidden md:flex items-center space-x-6">
                <a href="/" class="text-teal-600 font-bold border-b-2 border-teal-600">Home</a>
                <a href="/about.html" class="text-gray-600 hover:text-teal-600">About Us</a>
                <a href="/academics.html" class="text-gray-600 hover:text-teal-600">Academics</a>
                <a href="/projects.html" class="text-gray-600 hover:text-teal-600">Projects</a>
                <a href="/admissions.html" class="text-gray-600 hover:text-teal-600">Admissions</a>
                <a href="/donate.html" class="bg-amber-500 text-white font-bold py-2 px-5 rounded-full">Donate</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="hero-bg" class="hero-section text-white py-24 md:py-40">
            <div class="bg-black/40 py-16">
                <div class="container mx-auto px-6 text-center">
                    <h1 id="hero-headline" class="text-4xl md:text-6xl font-extrabold mb-4">Loading...</h1>
                    <p id="hero-subheadline" class="text-xl mb-8"></p>
                    <div class="space-x-4">
                        <a href="/admissions.html" class="bg-amber-500 text-gray-900 font-bold py-3 px-8 rounded-full">Admissions</a>
                        <a href="/donate.html" class="bg-teal-600 text-white font-bold py-3 px-8 rounded-full">Support Seva</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-20 bg-white">
            <div class="container mx-auto px-6">
                <h2 class="text-3xl font-bold text-center mb-12">Our Sacred Lineage</h2>
                <div id="lineage-container" class="grid md:grid-cols-3 gap-8 max-w-5xl mx-auto"></div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white py-10 text-center">
        <p id="footer-address" class="text-sm text-gray-400 mb-2"></p>
        <p class="text-xs">&copy; <span id="year"></span> Bhaktivedanta Vidyabhavan Gurukula.</p>
    </footer>

    <script>
        fetch('/_data/content.json').then(res => res.json()).then(data => {
            document.getElementById('hero-headline').innerText = data.homepage.hero_headline;
            document.getElementById('hero-subheadline').innerText = data.homepage.hero_subheadline;
            document.getElementById('hero-bg').style.backgroundImage = `url('${data.homepage.hero_image}')`;
            document.getElementById('footer-address').innerText = data.global.footer_address;
            document.getElementById('year').textContent = new Date().getFullYear();

            const lin = data.lineage;
            const masters = [
                { img: lin.prabhupada_image, name: lin.prabhupada_name, title: lin.prabhupada_title },
                { img: lin.maharaj_image, name: lin.maharaj_name, title: lin.maharaj_title },
                { img: lin.das_prabhu_image, name: lin.das_prabhu_name, title: lin.das_prabhu_title }
            ];
            document.getElementById('lineage-container').innerHTML = masters.map(m => `
                <div class="text-center p-6 bg-gray-50 rounded-xl shadow">
                    <img src="${m.img}" class="w-32 h-32 mx-auto rounded-full mb-4 border-2 border-amber-500 object-cover">
                    <h3 class="font-bold">${m.name}</h3>
                    <p class="text-teal-600 text-sm italic">${m.title}</p>
                </div>
            `).join('');
        });
        lucide.createIcons();
    </script>
</body>
</html>
