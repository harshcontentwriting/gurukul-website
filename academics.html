<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academics | BVG Murbad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg-color: #fdfaf6; --primary-color: #0D9488; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: #374151; }
        h1, h2, h3, h4 { font-family: 'Lora', serif; }
        .timeline-item { position: relative; padding-left: 2rem; padding-bottom: 2.5rem; }
        .timeline-dot { position: absolute; left: 0; top: 0; height: 0.75rem; width: 0.75rem; background-color: var(--primary-color); border-radius: 9999px; }
        .timeline-line { position: absolute; left: 0.35rem; top: 0; bottom: 0; width: 2px; background-color: #E5E7EB; }
    </style>
</head>
<body class="antialiased">
    <header class="bg-white/80 backdrop-blur-lg sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="/images/logo.png" alt="BVG Logo" class="h-12 w-12 rounded-full">
                <a href="/" class="text-xl font-bold">BVG Murbad</a>
            </div>
            <nav class="hidden md:flex items-center space-x-6">
                <a href="/" class="hover:text-teal-600">Home</a>
                <a href="/about.html" class="hover:text-teal-600">About Us</a>
                <a href="/academics.html" class="text-teal-600 font-bold border-b-2 border-teal-600">Academics</a>
                <a href="/projects.html" class="hover:text-teal-600">Projects</a>
                <a href="/admissions.html" class="hover:text-teal-600">Admissions</a>
                <a href="/donate.html" class="bg-amber-500 text-white py-2 px-5 rounded-full">Donate</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="bg-teal-900 text-white text-center py-20">
            <h1 id="academics-title" class="text-4xl md:text-5xl font-bold">Curriculum & Daily Life</h1>
            <p id="academics-subtitle" class="text-lg mt-4 max-w-3xl mx-auto">Loading...</p>
        </section>

        <section class="py-20 bg-white">
            <div class="container mx-auto px-6">
                <h2 class="text-3xl font-bold text-center mb-12 text-gray-800">A Day in the Life</h2>
                <div class="max-w-2xl mx-auto relative">
                    <div class="timeline-line"></div>
                    <div id="schedule-container"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white py-10 text-center text-sm">
        <p>&copy; 2026 Bhaktivedanta Vidyabhavan Gurukula. All Rights Reserved.</p>
    </footer>

    <script>
        fetch('/_data/content.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('academics-title').innerText = data.academics.title;
                document.getElementById('academics-subtitle').innerText = data.academics.subtitle;

                const container = document.getElementById('schedule-container');
                container.innerHTML = '';
                data.academics.daily_schedule.forEach(item => {
                    container.innerHTML += `
                        <div class="timeline-item">
                            <div class="timeline-dot"></div>
                            <h4 class="font-bold text-teal-700">${item.time}</h4>
                            <p class="text-gray-700 font-semibold">${item.activity}</p>
                        </div>
                    `;
                });
            });
        lucide.createIcons();
    </script>
</body>
</html>
